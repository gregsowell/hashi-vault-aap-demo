---
- name: Configure AAP 2.6 Controller objects

  hosts: localhost
  gather_facts: false
  collections:
    - ansible.controller

  vars:
    controller_host: ReplaceMe
    controller_username: admin
    controller_password: ansible123!
#    controller_oauthtoken: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('', true) }}"
    validate_certs: false

    organization_name: Default
    machine_credential_name: rhel
    custom_credential_type_name: special_key
    custom_credential_name: vault-special-key
    project_name: gregsowell
    project_repo: https://github.com/gregsowell/hashi-vault-aap-demo.git
    job_template_name: gregsowell-vault-test
    job_template_playbook: gregsowell-vault-test.yml

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ controller_host }}"
      controller_username: "{{ controller_username }}"
      controller_password: "{{ controller_password }}"
#      controller_oauthtoken: "{{ controller_oauthtoken | default(omit, true) }}"
      validate_certs: "{{ validate_certs }}"

  tasks:
    - name: Create machine credential named rhel
      ansible.controller.credential:
        name: "{{ machine_credential_name }}"
        organization: "{{ organization_name }}"
        credential_type: Machine
        inputs:
          username: rhel
          password: test123
        state: present

    - name: Create custom credential type named special_key
      ansible.controller.credential_type:
        name: "{{ custom_credential_type_name }}"
        kind: cloud
        inputs:
          fields:
            - id: special_key
              type: string
              label: Special Key
              secret: true
          required:
            - special_key
        injectors:
          extra_vars:
            special_key: "{{ '{{ special_key }}' }}"
        state: present

    - name: Create credential of type special_key
      ansible.controller.credential:
        name: "{{ custom_credential_name }}"
        organization: "{{ organization_name }}"
        credential_type: "{{ custom_credential_type_name }}"
        inputs:
          special_key: test123
        state: present

    - name: Create project and sync from public GitHub repo
      ansible.controller.project:
        name: "{{ project_name }}"
        organization: "{{ organization_name }}"
        scm_type: git
        scm_url: "{{ project_repo }}"
        update_project: true
        wait: true
        state: present

    - name: Create job template using both credentials
      ansible.controller.job_template:
        name: "{{ job_template_name }}"
        organization: "{{ organization_name }}"
        project: "{{ project_name }}"
        playbook: "{{ job_template_playbook }}"
        credentials:
          - "{{ machine_credential_name }}"
          - "{{ custom_credential_name }}"
        ask_inventory_on_launch: true
        state: present
